<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CodeSnap JS V4 is a local-first developer knowledge base and snippet studio." />
    <meta name="theme-color" content="#0f172a" />
    <title>CodeSnap JS V4</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./public/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <noscript><div class="noscript">CodeSnap JS needs JavaScript enabled.</div></noscript>

    <div class="app-shell">
      <aside class="sidebar" aria-label="Workspace navigation">
        <div class="brand">
          <span class="brand__mark">CS</span>
          <div>
            <h1>CodeSnap</h1>
            <p>V4 Knowledge Workspace</p>
          </div>
        </div>

        <nav class="nav" aria-label="Main navigation">
          <button class="nav__item is-active" data-view="dashboard">Dashboard</button>
          <button class="nav__item" data-view="snippets">Snippets</button>
          <button class="nav__item" data-view="playground">Playground</button>
          <button class="nav__item" data-view="notes">Dev Notes</button>
          <button class="nav__item" data-view="collections">Collections</button>
          <button class="nav__item" data-view="folders">Folders</button>
          <button class="nav__item" data-view="tags">Tags</button>
          <button class="nav__item" data-view="templates">Templates</button>
          <button class="nav__item" data-view="analytics">Analytics</button>
          <button class="nav__item" data-view="settings">Settings</button>
        </nav>

        <div class="sidebar__section">
          <div class="section-title">
            <span>Collections</span>
            <button class="icon-btn" data-action="new-collection" title="New collection">+</button>
          </div>
          <div id="collectionList" class="folder-list"></div>
        </div>

        <div class="sidebar__section">
          <div class="section-title">
            <span>Folders</span>
            <button class="icon-btn" data-action="new-folder" title="New folder">+</button>
          </div>
          <div id="folderList" class="folder-list"></div>
        </div>

        <div class="shortcut-card">
          <strong>Shortcuts</strong>
          <span><kbd>Ctrl</kbd> + <kbd>K</kbd> Command</span>
          <span><kbd>Ctrl</kbd> + <kbd>N</kbd> New snippet</span>
          <span><kbd>Ctrl</kbd> + <kbd>B</kbd> Backup</span>
          <span><kbd>/</kbd> Search</span>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Local-first developer workspace</p>
            <h2 id="viewTitle">Dashboard</h2>
          </div>
          <div class="topbar__actions">
            <label class="search-box" aria-label="Search workspace">
              <span>⌕</span>
              <input id="globalSearch" type="search" placeholder="Search snippets, notes, tags..." autocomplete="off" />
            </label>
            <button class="btn btn--ghost" data-action="open-command">Ctrl K</button>
            <button class="btn btn--ghost" data-action="toggle-theme">Theme</button>
            <button class="btn btn--primary" data-action="new-snippet">New Snippet</button>
          </div>
        </header>

        <section id="dashboardView" class="view is-visible"></section>
        <section id="snippetsView" class="view"></section>
        <section id="playgroundView" class="view"></section>
        <section id="notesView" class="view"></section>
        <section id="collectionsView" class="view"></section>
        <section id="foldersView" class="view"></section>
        <section id="tagsView" class="view"></section>
        <section id="templatesView" class="view"></section>
        <section id="analyticsView" class="view"></section>
        <section id="settingsView" class="view"></section>
      </main>
    </div>

    <div id="modalRoot" class="modal-root" aria-live="polite"></div>
    <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>
    <div id="commandRoot" class="command-root"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
